<h2>Carrito</h2>

<div class="row row-cols-1 row-cols-md-4 g-4">
  @for (data of libros; track $index) {
    <app-carta-libro [item]="data"></app-carta-libro>
  }
</div>

@if (libros.length > 0) {
  <p class="alert alert-primary mt-4">Libros en carrito: {{ libros.length }}</p>
  <button class="btn btn-success w-100" (click)="comprar()">Comprar</button>
}
